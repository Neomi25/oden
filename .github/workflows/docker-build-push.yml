name: Build and Push Docker Images

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          
      # Login to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Packages (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker images
        run: |
          # Docker Hub tags
          # docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/oden:latest .
          # docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/oden:${{ github.run_id }} .

          # GHCR tags
          docker build -t ghcr.io/neomi25/oden:latest .
          docker build -t ghcr.io/neomi25/oden:${{ github.run_id }} .

      - name: Push images
        run: |
          # Push to Docker Hub
          # docker push ${{ secrets.DOCKER_HUB_USERNAME }}/oden:latest
          # docker push ${{ secrets.DOCKER_HUB_USERNAME }}/oden:${{ github.run_id }}

          # Push to GHCR
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/neomi25/oden:latest
          docker push ghcr.io/neomi25/oden:${{ github.run_id }}

