name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/oden:latest .
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/oden:${{ github.run_id }} .

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/oden:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/oden:${{ github.run_id }}
